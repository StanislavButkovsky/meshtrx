; Общие настройки для ESP32 environments
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
custom_sdkconfig =
  CONFIG_PM_ENABLE=y
  CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
  CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3
  CONFIG_BT_CTRL_MODEM_SLEEP=y
  CONFIG_BT_CTRL_MODEM_SLEEP_MODE_1=y
  CONFIG_BT_CTRL_LPCLK_SEL_MAIN_XTAL=y
  CONFIG_BT_CTRL_MAIN_XTAL_PU_DURING_LIGHT_SLEEP=y
  CONFIG_ESP_PHY_MAC_BB_PD=y
  CONFIG_ESP_INSIGHTS_ENABLED=n
  CONFIG_ESP_RMAKER_SELF_CLAIM=n
  CONFIG_ESP_RMAKER_ASSISTED_CLAIM=n
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  jgromes/RadioLib @ ^6.4.0
  h2zero/NimBLE-Arduino @ ^2.5.0
  olikraus/U8g2 @ ^2.35.0
  bblanchon/ArduinoJson @ ^7.0.0
base_build_flags =
  -DARDUINO_USB_MODE=1
  -Ilib/codec2
  -DARDUINO_LOOP_STACK_SIZE=16384

; === Native тесты (на хосте, без железа) ===
[env:native]
platform = native
test_framework = unity
build_flags = -Isrc
test_build_src = false
test_ignore = test_embedded

; === Прошивка V3 ===
[env:heltec_wifi_lora_32_V3]
platform = ${common.platform}
board = ${common.board}
; custom_sdkconfig не нужен — PM_ENABLE уже в предсобранных libs
; extra_scripts = pre:gen_cert_stubs.py
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}
build_flags =
  ${common.base_build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3

; === Прошивка V4 ===
[env:heltec_wifi_lora_32_V4]
platform = ${common.platform}
board = ${common.board}
; custom_sdkconfig не нужен — PM_ENABLE уже в предсобранных libs (как в V3)
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}
build_flags =
  ${common.base_build_flags}
  -DBOARD_V4=1
  -DARDUINO_USB_CDC_ON_BOOT=1

; === Hardware тесты (на ESP32) ===
[env:test_embedded]
platform = ${common.platform}
board = ${common.board}
custom_sdkconfig = ${common.custom_sdkconfig}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}
test_build_src = true
test_ignore = test_native
build_flags =
  ${common.base_build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DPIO_UNIT_TESTING
